<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>じゅんびちゅう</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      min-height: 100%;
      font-family: "Hiragino Sans", "Hiragino Kaku Gothic ProN", "Yu Gothic UI", "Meiryo", sans-serif;
    }
    body {
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      background:
        radial-gradient(130% 80% at 50% -20%, rgba(255, 255, 255, 0.65) 0%, rgba(255, 255, 255, 0) 58%),
        linear-gradient(160deg, #0f1f4d 0%, #1f4b9f 34%, #26a8cc 58%, #27b07f 100%);
      background-size: 100% 100%, 180% 180%;
      animation:
        bgShift 14s ease-in-out infinite alternate,
        dayNightFilter 300s linear infinite;
      color: #263238;
      position: relative;
      overflow: hidden;
    }
    body::before {
      content: "";
      position: fixed;
      inset: -10%;
      pointer-events: none;
      background:
        radial-gradient(circle at 15% 20%, rgba(255, 255, 255, 0.23) 0 3px, transparent 4px),
        radial-gradient(circle at 70% 35%, rgba(255, 255, 255, 0.2) 0 2px, transparent 3px),
        radial-gradient(circle at 45% 75%, rgba(255, 255, 255, 0.18) 0 2px, transparent 3px);
      background-size: 320px 320px, 280px 280px, 380px 380px;
      opacity: 0.7;
      animation: sparkleMove 24s linear infinite;
      z-index: 0;
    }
    @keyframes bgShift {
      0% { background-position: 0 0, 0% 35%; }
      100% { background-position: 0 0, 100% 65%; }
    }
    @keyframes sparkleMove {
      0% { transform: translate(0, 0); }
      100% { transform: translate(-36px, -22px); }
    }
    @keyframes dayNightFilter {
      0%, 20% { filter: brightness(1) saturate(1); }
      45% { filter: brightness(0.88) saturate(1.05); }
      55% { filter: brightness(0.62) saturate(0.85); }
      80% { filter: brightness(0.88) saturate(1.02); }
      100% { filter: brightness(1) saturate(1); }
    }
    .card {
      position: relative;
      z-index: 1;
      background: rgba(255, 255, 255, 0.95);
      border-radius: 1.25rem;
      padding: 1.5rem 1.35rem;
      max-width: 420px;
      text-align: center;
      box-shadow: 0 8px 28px rgba(0, 0, 0, 0.12);
      border: 4px solid #90caf9;
    }
    h1 {
      margin: 0 0 0.75rem;
      font-size: clamp(1.3rem, 5vw, 1.65rem);
      font-weight: 900;
    }
    p {
      margin: 0 0 1.25rem;
      font-size: clamp(1rem, 3.8vw, 1.15rem);
      font-weight: 700;
      line-height: 1.55;
    }
    a {
      display: inline-block;
      min-height: 3rem;
      line-height: 3rem;
      padding: 0 1.5rem;
      font-size: clamp(1rem, 4vw, 1.15rem);
      font-weight: 800;
      text-decoration: none;
      color: #1b5e20;
      background: #a5d6a7;
      border: 4px solid #43a047;
      border-radius: 999px;
      box-shadow: 0 4px 0 #2e7d32;
    }
    a:active {
      transform: translateY(2px);
      box-shadow: 0 2px 0 #2e7d32;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>じゅんびちゅう です</h1>
    <p>この ゲームは これから つくるよ。<br />いま は ほかの あそびを たのしんでね。</p>
    <a href="/">TOPへ もどる</a>
  </div>
</body>
</html>
